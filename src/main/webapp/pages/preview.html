<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件预览 - 个人学习资料分享系统</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { height: 100vh; display: flex; flex-direction: column; }
        .preview-toolbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 20px; background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-lighter); flex-shrink: 0;
        }
        .preview-toolbar .file-info { font-size: 14px; font-weight: 500; }
        .preview-toolbar .btn-group { display: flex; gap: 8px; }
        .preview-body {
            flex: 1; display: flex; align-items: center; justify-content: center;
            overflow: auto; padding: 20px; background: var(--bg-primary);
        }
        .preview-body img { max-width: 90%; max-height: 90%; border-radius: var(--radius-md); box-shadow: var(--shadow-md); object-fit: contain; }
        .preview-body video { max-width: 90%; max-height: 90%; border-radius: var(--radius-md); box-shadow: var(--shadow-md); }
        .preview-body audio { width: 400px; }
        .preview-body iframe { width: 100%; height: 100%; border: none; border-radius: var(--radius-md); box-shadow: var(--shadow-md); background: white; }
        .preview-body pre { max-width: 90%; max-height: 90%; overflow: auto; background: var(--bg-secondary); padding: 20px; border-radius: var(--radius-md); font-family: var(--font-mono); font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; }
        .preview-body .text-content { max-width: 800px; width: 100%; max-height: 90%; overflow: auto; background: var(--bg-secondary); padding: 24px; border-radius: var(--radius-md); font-size: 14px; line-height: 1.8; }
        .preview-body .text-content a { color: var(--text-link); }
        .unsupported { text-align: center; padding: 60px; color: var(--text-tertiary); }
        .unsupported .icon { font-size: 64px; margin-bottom: 16px; }
        .unsupported h3 { font-size: 18px; margin-bottom: 8px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="preview-toolbar">
        <div class="file-info" id="fileName">文件预览</div>
        <div class="btn-group">
            <button class="btn btn-secondary btn-sm" id="downloadBtn">⬇ 下载</button>
            <button class="btn btn-ghost btn-sm" onclick="window.close()">✕ 关闭</button>
        </div>
    </div>
    <div class="preview-body" id="previewBody">
        <div class="loading-spinner"></div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const fileId = params.get('fileId');
        const fileName = params.get('fileName') || '文件预览';
        const fileType = (params.get('fileType') || '').toLowerCase();

        document.getElementById('fileName').textContent = fileName;

        async function loadPreview() {
            const body = document.getElementById('previewBody');

            try {
                // 获取文件信息
                const fileInfo = await API.file.getDetail(fileId);
                const ext = (fileInfo.data.fileType || fileType || '').toLowerCase();
                document.getElementById('fileName').textContent = fileInfo.data.fileName || fileName;

                const previewUrl = API.file.getPreviewUrl(fileId);
                const downloadUrl = API.file.getDownloadUrl(fileId);
                document.getElementById('downloadBtn').onclick = () => window.open(downloadUrl, '_blank');

                // 图片
                if (['jpg','jpeg','png','gif','bmp','svg','webp'].includes(ext)) {
                    body.innerHTML = `<img src="${previewUrl}" alt="${fileName}" onerror="this.parentElement.innerHTML='<div class=unsupported><div class=icon>🖼</div><h3>图片加载失败</h3></div>'">`;
                    return;
                }

                // 视频
                if (['mp4','webm','ogg','mov','avi','mkv','flv'].includes(ext)) {
                    body.innerHTML = `<video controls autoplay><source src="${previewUrl}" type="video/${ext}">您的浏览器不支持视频播放</video>`;
                    return;
                }

                // 音频
                if (['mp3','wav','ogg','flac','aac'].includes(ext)) {
                    body.innerHTML = `<audio controls autoplay><source src="${previewUrl}" type="audio/${ext}">您的浏览器不支持音频播放</audio>`;
                    return;
                }

                // PDF
                if (ext === 'pdf') {
                    body.innerHTML = `<iframe src="${previewUrl}"></iframe>`;
                    return;
                }

                // Word文档 - 使用mammoth.js预览
                if (['doc','docx'].includes(ext)) {
                    body.innerHTML = '<div class="loading-spinner"></div>';
                    try {
                        const response = await fetch(downloadUrl);
                        const arrayBuffer = await response.arrayBuffer();
                        // 使用mammoth.js转换
                        const script = document.createElement('script');
                        script.src = 'https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js';
                        script.onload = async () => {
                            const result = await mammoth.convertToHtml({arrayBuffer});
                            body.innerHTML = `<div class="text-content">${result.value}</div>`;
                        };
                        document.head.appendChild(script);
                    } catch (e) {
                        body.innerHTML = '<div class="unsupported"><div class="icon">📝</div><h3>文档加载失败</h3><p>请下载后查看</p></div>';
                    }
                    return;
                }

                // Excel - 使用SheetJS预览
                if (['xls','xlsx'].includes(ext)) {
                    body.innerHTML = '<div class="loading-spinner"></div>';
                    try {
                        const response = await fetch(downloadUrl);
                        const arrayBuffer = await response.arrayBuffer();
                        const script = document.createElement('script');
                        script.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
                        script.onload = () => {
                            const workbook = XLSX.read(arrayBuffer, {type: 'array'});
                            const firstSheet = workbook.SheetNames[0];
                            const worksheet = workbook.Sheets[firstSheet];
                            const html = XLSX.utils.sheet_to_html(worksheet);
                            body.innerHTML = `<div style="overflow:auto;max-width:95%;max-height:90%;background:white;border-radius:12px;box-shadow:var(--shadow-md);padding:16px;">
                                <h3 style="margin-bottom:12px;">${firstSheet}</h3>
                                <style>.xlsx-table {border-collapse:collapse;font-size:12px;}.xlsx-table td,.xlsx-table th{border:1px solid #d2d2d7;padding:4px 8px;min-width:60px;}</style>
                                ${html.replace(/<table/g,'<table class="xlsx-table"')}
                            </div>`;
                        };
                        document.head.appendChild(script);
                    } catch (e) {
                        body.innerHTML = '<div class="unsupported"><div class="icon">📊</div><h3>表格加载失败</h3><p>请下载后查看</p></div>';
                    }
                    return;
                }

                // PowerPoint - 建议下载
                if (['ppt','pptx'].includes(ext)) {
                    body.innerHTML = `<div class="unsupported">
                        <div class="icon">📽</div>
                        <h3>PowerPoint 演示文稿</h3>
                        <p style="margin-bottom:20px;">请下载后在本地查看</p>
                        <button class="btn btn-primary" onclick="window.open(downloadUrl,'_blank')">⬇ 下载文件</button>
                    </div>`;
                    return;
                }

                // 文本文件
                if (['txt','html','css','js','json','xml','java','py','cpp','sql','md','log'].includes(ext)) {
                    try {
                        const response = await fetch(previewUrl);
                        const text = await response.text();
                        body.innerHTML = `<pre><code>${escapeHtml(text)}</code></pre>`;
                    } catch(e) {
                        body.innerHTML = '<div class="unsupported"><div class="icon">📄</div><h3>文件加载失败</h3></div>';
                    }
                    return;
                }

                // 不支持的格式
                body.innerHTML = `<div class="unsupported">
                    <div class="icon">📄</div>
                    <h3>不支持在线预览此格式</h3>
                    <p style="margin-bottom:20px;">请下载后在本地查看</p>
                    <button class="btn btn-primary" onclick="window.open(downloadUrl,'_blank')">⬇ 下载文件</button>
                </div>`;

            } catch (e) {
                body.innerHTML = `<div class="unsupported">
                    <div class="icon">⚠️</div>
                    <h3>加载失败</h3>
                    <p>${e.message}</p>
                </div>`;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadPreview();
    </script>
</body>
</html>
