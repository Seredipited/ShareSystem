<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 个人学习资料分享系统</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .btn-full { width: 100%; justify-content: center; padding: 10px 24px; font-size: 14px; }
        .auth-footer { text-align: center; margin-top: 24px; font-size: 13px; color: var(--text-tertiary); }
        .auth-footer a { color: var(--text-link); }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <div class="logo-icon">📚</div>
                <h1>创建账号</h1>
                <p>开始使用个人学习资料分享系统</p>
            </div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label">用户名 *</label>
                    <input type="text" class="form-input" id="username"
                           placeholder="4-20位字母/数字" required minlength="4" maxlength="20">
                </div>
                <div class="form-group">
                    <label class="form-label">昵称</label>
                    <input type="text" class="form-input" id="nickname"
                           placeholder="给自己取个好听的名字">
                </div>
                <div class="form-group">
                    <label class="form-label">密码 *</label>
                    <input type="password" class="form-input" id="password"
                           placeholder="至少6位密码" required minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label">确认密码 *</label>
                    <input type="password" class="form-input" id="confirmPassword"
                           placeholder="再次输入密码" required minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label">邮箱</label>
                    <input type="email" class="form-input" id="email"
                           placeholder="选填，用于找回密码">
                </div>
                <div class="form-group">
                    <label class="form-label">手机号</label>
                    <input type="tel" class="form-input" id="phone"
                           placeholder="选填">
                </div>

                <p id="registerError" class="form-error" style="display:none; margin-bottom:12px;"></p>

                <button type="submit" class="btn btn-primary btn-full" id="registerBtn">
                    注册
                </button>
            </form>

            <p class="auth-footer">
                已有账号？<a href="login.html">立即登录</a>
            </p>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const errorEl = document.getElementById('registerError');

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            if (password !== confirmPassword) {
                errorEl.textContent = '两次密码输入不一致';
                errorEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = '注册中...';
            errorEl.style.display = 'none';

            try {
                const result = await API.user.register({
                    username: document.getElementById('username').value.trim(),
                    password: password,
                    confirmPassword: confirmPassword,
                    nickname: document.getElementById('nickname').value.trim(),
                    email: document.getElementById('email').value.trim(),
                    phone: document.getElementById('phone').value.trim()
                });
                if (result.code === 200) {
                    Toast.success('注册成功，即将跳转登录页');
                    setTimeout(() => { window.location.href = 'login.html'; }, 1000);
                } else {
                    errorEl.textContent = result.message || '注册失败';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = err.message || '注册失败，请稍后再试';
                errorEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = '注册';
            }
        }
    </script>
</body>
</html>
