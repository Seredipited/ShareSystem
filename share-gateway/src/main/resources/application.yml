server:
  port: 8180

spring:
  application:
    name: share-gateway
  main:
    web-application-type: reactive
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8181
          predicates:
            - Path=/api/user/**
        - id: file-service
          uri: http://localhost:8182
          predicates:
            - Path=/api/file/**
        - id: share-service
          uri: http://localhost:8182
          predicates:
            - Path=/api/share/**
        - id: admin-service-user
          uri: http://localhost:8181
          predicates:
            - Path=/api/admin/users/**
        - id: admin-service-file
          uri: http://localhost:8182
          predicates:
            - Path=/api/admin/files/**,/api/admin/shares/**,/api/admin/stats,/api/admin/logs
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin

logging:
  level:
    com.sharesystem.gateway: INFO
